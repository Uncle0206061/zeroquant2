basePath: /api/v1
definitions:
  github_com_Uncle0206061_zeroquant2_backend_internal_service.CreateStrategyReq:
    properties:
      description:
        type: string
      name:
        type: string
      rule_items:
        items:
          $ref: '#/definitions/github_com_Uncle0206061_zeroquant2_backend_internal_service.RuleItem'
        type: array
      rules:
        additionalProperties: true
        type: object
      status:
        description: 0=草稿 1=启用
        type: integer
    required:
    - name
    type: object
  github_com_Uncle0206061_zeroquant2_backend_internal_service.RuleItem:
    properties:
      enabled:
        type: boolean
      priority:
        type: integer
      rule_key:
        type: string
      rule_type:
        type: string
      rule_value: {}
    type: object
  github_com_Uncle0206061_zeroquant2_backend_internal_service.UpdateStrategyReq:
    properties:
      description:
        type: string
      name:
        type: string
      rule_items:
        items:
          $ref: '#/definitions/github_com_Uncle0206061_zeroquant2_backend_internal_service.RuleItem'
        type: array
      rules:
        additionalProperties: true
        type: object
      status:
        type: integer
    type: object
  github_com_Uncle0206061_zeroquant2_backend_pkg_response.Response:
    properties:
      code:
        description: 响应码：0=成功，非0=失败
        type: integer
      data:
        description: 响应数据
      message:
        description: 响应消息
        type: string
    type: object
  internal_handler.LoginReq:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  internal_handler.RegisterReq:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      role:
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
host: localhost:8080
info:
  contact: {}
  description: A股全自动交易系统后端API - 用户注册登录、策略管理、模拟交易、实盘交易、WebSocket实时推送
