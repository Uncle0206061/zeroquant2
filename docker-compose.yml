# ZeroQuant 2.0 - Docker Compose 部署配置
# 使用方式：docker-compose up -d
version: "3.8"

services:
  # ============ PostgreSQL ============
  postgres:
    image: postgres:16-alpine
    container_name: zq2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zq215007}
      POSTGRES_DB: biz
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/backup:/backup  # 备份脚本挂载
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zq2-network

  # ============ Redis ============
  redis:
    image: redis:7-alpine
    container_name: zq2-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zq2-network

  # ============ Go Backend ============
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zq2-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: "8080"
      MODE: "release"
      LOG_LEVEL: "info"
      LOG_PATH: "/app/logs/app.log"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-zq215007}
      DB_NAME: biz
      DB_MAX_IDLE_CONNS: "10"
      DB_MAX_OPEN_CONNS: "30"
      DB_CONN_MAX_LIFE: "3600"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET:-zq2_zeroquant_secret_2025_secure_key}
      JWT_EXPIRE: "168"
      DATA_SERVICE_URL: "http://data-service:8081"
      REAL_TRADE: "false"  # 默认关闭实盘，需要时手动开启
    ports:
      - "8080:8080"
    volumes:
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - zq2-network

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local

networks:
  zq2-network:
    driver: bridge
